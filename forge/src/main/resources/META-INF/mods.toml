modLoader = "javafml"
loaderVersion = "${forge_range}"
license = "MIT"
issueTrackerURL = "https://www.curseforge.com/minecraft/mc-mods/loot-all"

[[mods]]
modId = "${id}"
version = "${version}"
displayName = "${name}"
authors = "Sxilverr"
description = "Looting made easy."
logoFile = "icon.png"

[[dependencies.${id}]]
    modId = "forge"
    mandatory = true
    versionRange = "${forge_range}"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.${id}]]
    modId = "minecraft"
    mandatory = true
    versionRange = "${minecraft}"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.${id}]]
    modId = "lootr"
    mandatory = false
    versionRange = "*"
    ordering = "AFTER"
    side = "BOTH"
